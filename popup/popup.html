<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Extreme Focus Mode</title>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
<div id="app">

  <!-- EFM Header -->
  <header>
    <div class="title-row">
      <span class="dot" id="dot"></span>
      <h1 id="mode-title">FOCUS MODE</h1>
    </div>
    <span id="status-badge" class="badge hidden"></span>
  </header>

  <!-- Behavior Monitor (replaces Gemini) -->
  <div class="monitor-box">
    <div class="monitor-label">BEHAVIOR MONITOR</div>
    <div class="metrics-row">
      <div class="metric">
        <div class="metric-val" id="m-scroll">0</div>
        <div class="metric-key">scroll<br>px/s</div>
        <div class="metric-bar-wrap"><div class="metric-bar" id="bar-scroll"></div></div>
      </div>
      <div class="metric">
        <div class="metric-val" id="m-cursor">0</div>
        <div class="metric-key">cursor<br>px/s</div>
        <div class="metric-bar-wrap"><div class="metric-bar" id="bar-cursor"></div></div>
      </div>
      <div class="metric">
        <div class="metric-val" id="m-typing">0</div>
        <div class="metric-key">typing<br>k/s</div>
        <div class="metric-bar-wrap"><div class="metric-bar" id="bar-typing"></div></div>
      </div>
    </div>
    <p class="hint" id="monitor-hint">Thresholds: scroll &gt;200px/s · cursor &gt;800px/s · typing &gt;8k/s</p>
  </div>

  <!-- Pick to keep (from EFM) -->
  <div class="section">
    <p class="section-label">PICK WHAT TO KEEP</p>
    <button id="btn-pick" class="btn">☞ Select Elements to Keep</button>
    <button id="btn-confirm" class="btn btn-solid hidden">✓ Done — Remove Everything Else</button>
    <p class="hint" id="pick-hint">Click areas on the page you want to keep. Everything else gets hidden.</p>
  </div>

  <!-- Helix checkboxes -->
  <div class="section">
    <p class="section-label">FOCUS SETTINGS <span class="auto-tag" id="auto-tag" style="display:none">● AUTO</span></p>
    <label class="check-row"><input type="checkbox" id="chk-img"/><span>Remove Images</span></label>
    <label class="check-row"><input type="checkbox" id="chk-vid"/><span>Remove Videos</span></label>
    <label class="check-row"><input type="checkbox" id="chk-nav"/><span>Remove Sidebars &amp; Nav</span></label>
    <label class="check-row"><input type="checkbox" id="chk-text"/><span>Big Text</span></label>
    <label class="check-row"><input type="checkbox" id="chk-extreme"/><span>Extreme Mode</span></label>
  </div>

  <!-- Helix Apply button -->
  <div class="section">
    <button id="btn-apply" class="btn btn-solid">Apply</button>
    <button id="btn-reset" class="btn">Reset</button>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
